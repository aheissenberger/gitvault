name: build

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CARGO_HOME: ${{ github.workspace }}/.cargo
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect cargo workspace
        id: cargo
        run: |
          if [[ -f Cargo.toml ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Rust stable
        if: steps.cargo.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy,rustfmt

      - name: Cache cargo artifacts
        if: steps.cargo.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        if: steps.cargo.outputs.present == 'true'
        run: cargo fmt --all -- --check

      - name: Run clippy
        if: steps.cargo.outputs.present == 'true'
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        if: steps.cargo.outputs.present == 'true'
        run: cargo test --all-targets

      - name: Release tag consistency check
        if: steps.cargo.outputs.present == 'true' && startsWith(github.ref, 'refs/tags/v')
        run: cargo run -p xtask -- release-check

      - name: Skip message
        if: steps.cargo.outputs.present != 'true'
        run: echo "No Cargo.toml found; skipping Rust CI checks."