name: release-binaries

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish binaries to a GitHub Release on manual runs"
        required: false
        default: false
        type: boolean
      tap_repo:
        description: "owner/repo of Homebrew tap (optional override)"
        required: false
      tap_formula_path:
        description: "Formula path in tap repo (optional override)"
        required: false
      tap_branch:
        description: "Branch in tap repo to update (optional override; defaults to main)"
        required: false
  push:
    tags:
      - 'v*'

concurrency:
  group: release-binaries-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CARGO_HOME: ${{ github.workspace }}/.cargo-home
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Setup Rust 1.93.1
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.93.1
          components: clippy,rustfmt

      - name: Cache cargo artifacts
        id: cache_verify
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          shared-key: rust-${{ runner.os }}-1.93.1

      - name: Cache diagnostics (verify)
        run: |
          echo "rust-cache cache-hit: '${{ steps.cache_verify.outputs.cache-hit }}'"
          echo "CARGO_HOME=$CARGO_HOME"
          echo "CARGO_TARGET_DIR=$CARGO_TARGET_DIR"
          du -sh "$CARGO_HOME/registry" "$CARGO_HOME/git" 2>/dev/null || true
          du -sh "$CARGO_TARGET_DIR" 2>/dev/null || true

      - name: Cache summary (verify)
        run: |
          {
            echo "### Cache status (verify)"
            echo "- OS: $RUNNER_OS"
            echo "- rust-cache hit: ${{ steps.cache_verify.outputs.cache-hit || 'n/a' }}"
            echo "- shared-key: rust-${{ runner.os }}-1.93.1"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Persist cache status (verify)
        run: |
          set -euo pipefail
          mkdir -p cache-status
          cat > cache-status/verify-${{ runner.os }}.tsv <<'EOF'
verify	${{ runner.os }}	-	${{ steps.cache_verify.outputs.cache-hit || 'n/a' }}	rust-${{ runner.os }}-1.93.1
EOF

      - name: Upload cache status (verify)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cache-status-verify-${{ runner.os }}
          path: cache-status/verify-${{ runner.os }}.tsv

      - name: Prefetch workspace dependencies
        run: cargo fetch --locked

      - name: Prefetch xtask dependencies
        run: cargo fetch --manifest-path xtask/Cargo.toml

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Enforce Rust line coverage
        # ssm.rs and aws_config.rs are gated by the `ssm` feature and require
        # live AWS credentials to exercise; exclude them so the threshold
        # reflects coverage of code that can actually run in CI.
        run: cargo llvm-cov --workspace --all-features --ignore-filename-regex "aws_config\.rs" --fail-under-lines 95

      - name: Release tag consistency check
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git fetch --force --tags
          cargo run --locked --manifest-path xtask/Cargo.toml -- release-check

  build:
    needs:
      - verify
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      CARGO_HOME: ${{ github.workspace }}/.cargo-home
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: gitvault-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: gitvault-windows-x86_64.exe
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: gitvault-macos-aarch64
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: gitvault-macos-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust 1.93.1
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.93.1
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        id: cache_build
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          shared-key: rust-${{ runner.os }}-1.93.1

      - name: Cache diagnostics (build)
        run: |
          echo "rust-cache cache-hit: '${{ steps.cache_build.outputs.cache-hit }}'"
          echo "CARGO_HOME=$CARGO_HOME"
          echo "CARGO_TARGET_DIR=$CARGO_TARGET_DIR"
          du -sh "$CARGO_HOME/registry" "$CARGO_HOME/git" 2>/dev/null || true
          du -sh "$CARGO_TARGET_DIR" 2>/dev/null || true

      - name: Cache summary (build)
        run: |
          {
            echo "### Cache status (build)"
            echo "- OS: $RUNNER_OS"
            echo "- target: ${{ matrix.target }}"
            echo "- rust-cache hit: ${{ steps.cache_build.outputs.cache-hit || 'n/a' }}"
            echo "- shared-key: rust-${{ runner.os }}-1.93.1"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Persist cache status (build)
        run: |
          set -euo pipefail
          mkdir -p cache-status
          cat > cache-status/build-${{ matrix.target }}-${{ runner.os }}.tsv <<'EOF'
build	${{ runner.os }}	${{ matrix.target }}	${{ steps.cache_build.outputs.cache-hit || 'n/a' }}	rust-${{ runner.os }}-1.93.1
EOF

      - name: Upload cache status (build)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cache-status-build-${{ matrix.target }}-${{ runner.os }}
          path: cache-status/build-${{ matrix.target }}-${{ runner.os }}.tsv

      - name: Prefetch target dependencies
        run: cargo fetch --locked --target ${{ matrix.target }}

      - name: Prefetch xtask dependencies
        if: matrix.os == 'ubuntu-latest'
        run: cargo fetch --manifest-path xtask/Cargo.toml

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Rename artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/gitvault ${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/gitvault.exe ${{ matrix.artifact }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
      attestations: write
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Collect release asset files
        run: |
          set -euo pipefail
          mkdir -p dist

          expected=(
            gitvault-linux-x86_64
            gitvault-windows-x86_64.exe
            gitvault-macos-aarch64
            gitvault-macos-x86_64
          )

          for name in "${expected[@]}"; do
            src="$(find artifacts -type f -name "$name" -print -quit)"
            [[ -n "$src" ]] || { echo "Missing artifact file: $name" >&2; exit 1; }
            cp "$src" "dist/$name"
          done

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          {
            find dist -type f -name 'gitvault-*' -print0 \
              | while IFS= read -r -d '' file; do
                  name="$(basename "$file")"
                  sum="$(sha256sum "$file" | awk '{print $1}')"
                  printf '%s  %s\n' "$sum" "$name"
                done
          } | sort > dist/SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign and verify release assets
        run: |
          set -euo pipefail
          shopt -s nullglob

          assets=(
            dist/gitvault-linux-x86_64
            dist/gitvault-windows-x86_64.exe
            dist/gitvault-macos-aarch64
            dist/gitvault-macos-x86_64
            dist/SHA256SUMS
          )

          identity_regex="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/build.yml@.*"
          issuer="https://token.actions.githubusercontent.com"

          for asset in "${assets[@]}"; do
            cosign sign-blob --yes "$asset" \
              --output-signature "${asset}.sig" \
              --output-certificate "${asset}.pem"

            cosign verify-blob "$asset" \
              --signature "${asset}.sig" \
              --certificate "${asset}.pem" \
              --certificate-identity-regexp "$identity_regex" \
              --certificate-oidc-issuer "$issuer"
          done

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: |
            dist/gitvault-linux-x86_64
            dist/gitvault-windows-x86_64.exe
            dist/gitvault-macos-aarch64
            dist/gitvault-macos-x86_64
            dist/SHA256SUMS

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: |
            dist/gitvault-linux-x86_64
            dist/gitvault-linux-x86_64.sig
            dist/gitvault-linux-x86_64.pem
            dist/gitvault-windows-x86_64.exe
            dist/gitvault-windows-x86_64.exe.sig
            dist/gitvault-windows-x86_64.exe.pem
            dist/gitvault-macos-aarch64
            dist/gitvault-macos-aarch64.sig
            dist/gitvault-macos-aarch64.pem
            dist/gitvault-macos-x86_64
            dist/gitvault-macos-x86_64.sig
            dist/gitvault-macos-x86_64.pem
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
            dist/SHA256SUMS.pem

  cache-recap:
    name: Cache recap
    needs:
      - verify
      - build
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
    steps:
      - name: Download cache status artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: cache-status-*
          merge-multiple: true
          path: cache-status

      - name: Generate recap summary
        run: |
          set -euo pipefail

          {
            echo "### Cache recap"
            echo
            echo "| Job | OS | Target | Cache hit | Shared key |"
            echo "| --- | --- | --- | --- | --- |"

            shopt -s nullglob
            files=(cache-status/*.tsv)
            if [[ ${#files[@]} -eq 0 ]]; then
              echo "| - | - | - | no data | - |"
            else
              for file in "${files[@]}"; do
                while IFS=$'\t' read -r job os target cache_hit shared_key; do
                  echo "| ${job} | ${os} | ${target} | ${cache_hit} | ${shared_key} |"
                done < "$file"
              done | sort
            fi
            echo
            echo "_Note: First run after a key change or lockfile/toolchain update is expected to be cold (`false`/`n/a`). Subsequent runs on the same OS with unchanged inputs should trend warm (`true`)._"
          } >> "$GITHUB_STEP_SUMMARY"

  homebrew:
    name: Update Homebrew tap
    needs: publish
    runs-on: ubuntu-latest
    environment: homebrew
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - name: Resolve metadata
        id: meta
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          INPUT_TAP_REPO: ${{ github.event.inputs.tap_repo }}
          INPUT_FORMULA_PATH: ${{ github.event.inputs.tap_formula_path }}
          INPUT_TAP_BRANCH: ${{ github.event.inputs.tap_branch }}
          DEFAULT_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          DEFAULT_FORMULA_PATH: ${{ vars.HOMEBREW_TAP_FORMULA_PATH }}
          DEFAULT_TAP_BRANCH: ${{ vars.HOMEBREW_TAP_BRANCH }}
        run: |
          set -euo pipefail
          [[ -n "${GH_TOKEN:-}" ]] || { echo "Missing HOMEBREW_TAP_TOKEN" >&2; exit 1; }

          tap_repo="${INPUT_TAP_REPO:-${DEFAULT_TAP_REPO:-}}"
          [[ -n "${tap_repo}" ]] || { echo "Missing tap repo (set workflow input tap_repo or repo variable HOMEBREW_TAP_REPO)" >&2; exit 1; }

          tap_push_allowed="$(gh api "/repos/${tap_repo}" --jq '.permissions.push' || true)"
          [[ "${tap_push_allowed}" == "true" ]] || { echo "HOMEBREW_TAP_TOKEN cannot push to ${tap_repo}" >&2; exit 1; }
          tap_branch="${INPUT_TAP_BRANCH:-${DEFAULT_TAP_BRANCH:-main}}"
          [[ -n "${tap_branch}" ]] || { echo "Missing tap branch (set workflow input tap_branch or repo variable HOMEBREW_TAP_BRANCH)" >&2; exit 1; }

          if ! gh api "/repos/${tap_repo}/branches/${tap_branch}" >/dev/null 2>&1; then
            echo "Tap branch not found: ${tap_repo}@${tap_branch}" >&2
            exit 1
          fi

          formula_path="${INPUT_FORMULA_PATH:-${DEFAULT_FORMULA_PATH:-Formula/gitvault.rb}}"
          release_tag="${GITHUB_REF_NAME}"
          version="${release_tag#v}"
          release_base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${release_tag}"

          echo "tap_repo=${tap_repo}" >> "$GITHUB_OUTPUT"
          echo "tap_branch=${tap_branch}" >> "$GITHUB_OUTPUT"
          echo "formula_path=${formula_path}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "url_aarch64=${release_base}/gitvault-macos-aarch64" >> "$GITHUB_OUTPUT"
          echo "url_x86_64=${release_base}/gitvault-macos-x86_64" >> "$GITHUB_OUTPUT"
          echo "url_sums=${release_base}/SHA256SUMS" >> "$GITHUB_OUTPUT"

      - name: Compute asset checksums
        id: sums
        env:
          URL_SUMS: ${{ steps.meta.outputs.url_sums }}
        run: |
          set -euo pipefail
          curl -fsSL "$URL_SUMS" -o SHA256SUMS

          sha_aarch64="$(awk '$2 == "gitvault-macos-aarch64" {print $1}' SHA256SUMS)"
          sha_x86_64="$(awk '$2 == "gitvault-macos-x86_64" {print $1}' SHA256SUMS)"
          [[ -n "$sha_aarch64" ]] || { echo "Missing SHA for gitvault-macos-aarch64" >&2; exit 1; }
          [[ -n "$sha_x86_64" ]] || { echo "Missing SHA for gitvault-macos-x86_64" >&2; exit 1; }

          echo "sha_aarch64=${sha_aarch64}" >> "$GITHUB_OUTPUT"
          echo "sha_x86_64=${sha_x86_64}" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ steps.meta.outputs.tap_repo }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          ref: ${{ steps.meta.outputs.tap_branch }}
          path: tap

      - name: Create or update formula
        env:
          FORMULA_PATH: ${{ steps.meta.outputs.formula_path }}
          VERSION: ${{ steps.meta.outputs.version }}
          URL_AARCH64: ${{ steps.meta.outputs.url_aarch64 }}
          URL_X86_64: ${{ steps.meta.outputs.url_x86_64 }}
          SHA_AARCH64: ${{ steps.sums.outputs.sha_aarch64 }}
          SHA_X86_64: ${{ steps.sums.outputs.sha_x86_64 }}
        run: |
          set -euo pipefail
          file="tap/${FORMULA_PATH}"
          mkdir -p "$(dirname "$file")"
          if [[ -f "$file" ]]; then
            echo "Updating existing formula: ${FORMULA_PATH}"
          else
            echo "Creating new formula: ${FORMULA_PATH}"
          fi

          formula_basename="$(basename "${FORMULA_PATH}" .rb)"
          class_name="$(echo "${formula_basename}" | sed 's/[-_]/ /g' | awk '{for(i=1;i<=NF;i++){$i=toupper(substr($i,1,1)) substr($i,2)}}1' | tr -d ' ')"

          {
            printf 'class %s < Formula\n' "$class_name"
            printf '  desc "Secure, Git-native vault for managing age-encrypted secrets"\n'
            printf '  homepage "https://github.com/%s"\n' "$GITHUB_REPOSITORY"
            printf '  version "%s"\n' "$VERSION"
            printf '  license "MIT"\n'
            printf '\n'
            printf '  on_macos do\n'
            printf '    on_arm do\n'
            printf '      url "%s"\n' "$URL_AARCH64"
            printf '      sha256 "%s"\n' "$SHA_AARCH64"
            printf '    end\n'
            printf '\n'
            printf '    on_intel do\n'
            printf '      url "%s"\n' "$URL_X86_64"
            printf '      sha256 "%s"\n' "$SHA_X86_64"
            printf '    end\n'
            printf '  end\n'
            printf '\n'
            printf '  def install\n'
            printf '    if Hardware::CPU.arm?\n'
            printf '      bin.install "gitvault-macos-aarch64" => "gitvault"\n'
            printf '    else\n'
            printf '      bin.install "gitvault-macos-x86_64" => "gitvault"\n'
            printf '    end\n'
            printf '  end\n'
            printf '\n'
            printf '  test do\n'
            printf '    system bin/"gitvault", "--help"\n'
            printf '  end\n'
            printf 'end\n'
          } > "$file"

      - name: Commit and push formula update
        env:
          TAP_BRANCH: ${{ steps.meta.outputs.tap_branch }}
          VERSION: ${{ steps.meta.outputs.version }}
          FORMULA_PATH: ${{ steps.meta.outputs.formula_path }}
        run: |
          set -euo pipefail
          cd tap

          if [[ -z "$(git status --porcelain -- "${FORMULA_PATH}")" ]]; then
            echo "No formula changes detected; skipping push."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${FORMULA_PATH}"
          git commit -m "chore: update formula for ${VERSION}"
          git push origin "HEAD:${TAP_BRANCH}"