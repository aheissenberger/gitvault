name: release-macos-sign-notarize

on:
  workflow_dispatch:
    inputs:
      binary_name:
        description: "CLI binary name (cargo package executable)"
        required: false
      version:
        description: "Version without v prefix (optional; defaults to tag name)"
        required: false
      tap_repo:
        description: "owner/repo of Homebrew tap (optional)"
        required: false
      tap_formula_path:
        description: "Path to formula in tap repo (e.g. Formula/mycli.rb)"
        required: false
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CARGO_HOME: ${{ github.workspace }}/.cargo
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Cargo project
        run: |
          [[ -f Cargo.toml ]] || { echo "Cargo.toml not found" >&2; exit 1; }

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy,rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all-targets

  build-sign-notarize:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    needs: verify
    environment: MacOS App Signing
    runs-on: macos-14
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      CARGO_HOME: ${{ github.workspace }}/.cargo
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    outputs:
      binary_name: ${{ steps.meta.outputs.binary_name }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}
      archive_name_aarch64: ${{ steps.package.outputs.archive_name_aarch64 }}
      archive_sha256_aarch64: ${{ steps.package.outputs.archive_sha256_aarch64 }}
      archive_name_x86_64: ${{ steps.package.outputs.archive_name_x86_64 }}
      archive_sha256_x86_64: ${{ steps.package.outputs.archive_sha256_x86_64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Cargo project
        run: |
          [[ -f Cargo.toml ]] || { echo "Cargo.toml not found" >&2; exit 1; }

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Resolve metadata
        id: meta
        env:
          INPUT_BINARY_NAME: ${{ github.event.inputs.binary_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_BINARY_NAME:-}" ]]; then
            binary_name="${INPUT_BINARY_NAME}"
          else
            binary_name="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].targets[] | select(.kind[] == "bin") | .name' | head -n1)"
            if [[ -z "${binary_name}" || "${binary_name}" == "null" ]]; then
              binary_name="$(basename "${GITHUB_REPOSITORY}")"
            fi
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            version="${release_tag#v}"
          elif [[ -n "${INPUT_VERSION:-}" ]]; then
            version="${INPUT_VERSION}"
            release_tag="v${version}"
          else
            version="0.0.0-dev"
            release_tag="v${version}"
          fi

          echo "binary_name=${binary_name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Build both macOS targets (stripped via Cargo profile)
        env:
          BINARY_NAME: ${{ steps.meta.outputs.binary_name }}
        run: |
          set -euo pipefail
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          [[ -f "target/aarch64-apple-darwin/release/${BINARY_NAME}" ]] || { echo "Missing ARM binary" >&2; exit 1; }
          [[ -f "target/x86_64-apple-darwin/release/${BINARY_NAME}" ]] || { echo "Missing x86_64 binary" >&2; exit 1; }

      - name: Prepare per-arch binaries (already stripped)
        env:
          BINARY_NAME: ${{ steps.meta.outputs.binary_name }}
        run: |
          set -euo pipefail
          mkdir -p dist/aarch64-apple-darwin dist/x86_64-apple-darwin
          cp "target/aarch64-apple-darwin/release/${BINARY_NAME}" "dist/aarch64-apple-darwin/${BINARY_NAME}"
          cp "target/x86_64-apple-darwin/release/${BINARY_NAME}" "dist/x86_64-apple-darwin/${BINARY_NAME}"
          chmod +x "dist/aarch64-apple-darwin/${BINARY_NAME}" "dist/x86_64-apple-darwin/${BINARY_NAME}"

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          [[ -n "${MACOS_CERTIFICATE_P12_BASE64}" ]] || { echo "Missing MACOS_CERTIFICATE_P12_BASE64" >&2; exit 1; }
          [[ -n "${MACOS_CERTIFICATE_PASSWORD}" ]] || { echo "Missing MACOS_CERTIFICATE_PASSWORD" >&2; exit 1; }
          [[ -n "${MACOS_KEYCHAIN_PASSWORD}" ]] || { echo "Missing MACOS_KEYCHAIN_PASSWORD" >&2; exit 1; }

          echo "${MACOS_CERTIFICATE_P12_BASE64}" | base64 --decode > cert.p12
          security create-keychain -p "${MACOS_KEYCHAIN_PASSWORD}" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "${MACOS_KEYCHAIN_PASSWORD}" build.keychain
          security import cert.p12 -k build.keychain -P "${MACOS_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security list-keychain -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "${MACOS_KEYCHAIN_PASSWORD}" build.keychain

      - name: Code sign binaries
        env:
          BINARY_NAME: ${{ steps.meta.outputs.binary_name }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          [[ -n "${MACOS_SIGNING_IDENTITY}" ]] || { echo "Missing MACOS_SIGNING_IDENTITY" >&2; exit 1; }
          for arch in aarch64-apple-darwin x86_64-apple-darwin; do
            bin="dist/${arch}/${BINARY_NAME}"
            codesign --force --options runtime --timestamp --sign "${MACOS_SIGNING_IDENTITY}" "${bin}"
            codesign --verify --verbose=2 "${bin}"
          done

      - name: Package and checksum
        id: package
        env:
          BINARY_NAME: ${{ steps.meta.outputs.binary_name }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
        run: |
          set -euo pipefail
          archive_name_aarch64="${BINARY_NAME}-${RELEASE_TAG}-aarch64-apple-darwin.tar.gz"
          archive_name_x86_64="${BINARY_NAME}-${RELEASE_TAG}-x86_64-apple-darwin.tar.gz"

          tar -C "dist/aarch64-apple-darwin" -czf "dist/${archive_name_aarch64}" "${BINARY_NAME}"
          tar -C "dist/x86_64-apple-darwin" -czf "dist/${archive_name_x86_64}" "${BINARY_NAME}"

          archive_sha256_aarch64="$(shasum -a 256 "dist/${archive_name_aarch64}" | awk '{print $1}')"
          archive_sha256_x86_64="$(shasum -a 256 "dist/${archive_name_x86_64}" | awk '{print $1}')"

          echo "archive_name_aarch64=${archive_name_aarch64}" >> "$GITHUB_OUTPUT"
          echo "archive_sha256_aarch64=${archive_sha256_aarch64}" >> "$GITHUB_OUTPUT"
          echo "archive_name_x86_64=${archive_name_x86_64}" >> "$GITHUB_OUTPUT"
          echo "archive_sha256_x86_64=${archive_sha256_x86_64}" >> "$GITHUB_OUTPUT"

      - name: Notarize packaged binaries
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_P8_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_P8_BASE64 }}
          BINARY_NAME: ${{ steps.meta.outputs.binary_name }}
        run: |
          set -euo pipefail
          [[ -n "${APPLE_API_KEY_ID}" ]] || { echo "Missing APPLE_API_KEY_ID" >&2; exit 1; }
          [[ -n "${APPLE_API_ISSUER_ID}" ]] || { echo "Missing APPLE_API_ISSUER_ID" >&2; exit 1; }
          [[ -n "${APPLE_API_PRIVATE_KEY_P8_BASE64}" ]] || { echo "Missing APPLE_API_PRIVATE_KEY_P8_BASE64" >&2; exit 1; }
          api_key_file="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"

          # Accept both base64-encoded and raw/escaped .p8 secret content.
          if echo "${APPLE_API_PRIVATE_KEY_P8_BASE64}" | base64 --decode > "${api_key_file}.decoded" 2>/dev/null \
            && grep -q "BEGIN PRIVATE KEY" "${api_key_file}.decoded"; then
            mv "${api_key_file}.decoded" "${api_key_file}"
          else
            printf '%b' "${APPLE_API_PRIVATE_KEY_P8_BASE64}" | sed $'s/\r$//' > "${api_key_file}"
          fi

          grep -q "BEGIN PRIVATE KEY" "${api_key_file}" || { echo "APPLE_API_PRIVATE_KEY_P8_BASE64 does not contain a valid .p8 private key" >&2; exit 1; }

          for arch in aarch64-apple-darwin x86_64-apple-darwin; do
            notarize_zip="dist/${BINARY_NAME}-${arch}-notarize.zip"
            ditto -c -k --sequesterRsrc --keepParent "dist/${arch}/${BINARY_NAME}" "${notarize_zip}"
            xcrun notarytool submit "${notarize_zip}" \
              --key "${api_key_file}" \
              --key-id "${APPLE_API_KEY_ID}" \
              --issuer "${APPLE_API_ISSUER_ID}" \
              --wait
          done
          rm -f "${api_key_file}"

      - name: Upload workflow artifact (aarch64)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive_name_aarch64 }}
          path: dist/${{ steps.package.outputs.archive_name_aarch64 }}

      - name: Upload workflow artifact (x86_64)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive_name_x86_64 }}
          path: dist/${{ steps.package.outputs.archive_name_x86_64 }}


  build-and-sign:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    needs: verify
    name: Build and sign (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    env:
      CARGO_HOME: ${{ github.workspace }}/.cargo
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: gitvault-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: gitvault-windows-x86_64.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary (stripped via Cargo profile)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/gitvault ${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/gitvault.exe ${{ matrix.artifact }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifact with cosign (keyless)
        run: cosign sign-blob --yes --bundle ${{ matrix.artifact }}.bundle ${{ matrix.artifact }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.bundle

  publish-release:
    if: ${{ github.ref_type == 'tag' }}
    needs:
      - build-sign-notarize
      - build-and-sign
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*-aarch64-apple-darwin.tar.gz
            artifacts/**/*-x86_64-apple-darwin.tar.gz
            artifacts/**/gitvault-linux-x86_64
            artifacts/**/gitvault-linux-x86_64.bundle
            artifacts/**/gitvault-windows-x86_64.exe
            artifacts/**/gitvault-windows-x86_64.exe.bundle

  update-homebrew-tap:
    environment: homebrew
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    needs:
      - build-sign-notarize
      - publish-release
    env:
      GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Resolve tap metadata
        id: tapmeta
        env:
          INPUT_TAP_REPO: ${{ github.event.inputs.tap_repo }}
          INPUT_FORMULA_PATH: ${{ github.event.inputs.tap_formula_path }}
          DEFAULT_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          DEFAULT_FORMULA_PATH: ${{ vars.HOMEBREW_TAP_FORMULA_PATH }}
          BINARY_NAME: ${{ needs.build-sign-notarize.outputs.binary_name }}
          RELEASE_TAG: ${{ needs.build-sign-notarize.outputs.release_tag }}
          VERSION: ${{ needs.build-sign-notarize.outputs.version }}
          ARCHIVE_NAME_AARCH64: ${{ needs.build-sign-notarize.outputs.archive_name_aarch64 }}
          ARCHIVE_SHA256_AARCH64: ${{ needs.build-sign-notarize.outputs.archive_sha256_aarch64 }}
          ARCHIVE_NAME_X86_64: ${{ needs.build-sign-notarize.outputs.archive_name_x86_64 }}
          ARCHIVE_SHA256_X86_64: ${{ needs.build-sign-notarize.outputs.archive_sha256_x86_64 }}
        run: |
          set -euo pipefail
          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_TOKEN is not configured; skipping tap update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tap_repo="${INPUT_TAP_REPO:-${DEFAULT_TAP_REPO:-}}"
          if [[ -z "${tap_repo}" ]]; then
            echo "No tap repo provided; skipping tap update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          formula_path="${INPUT_FORMULA_PATH:-${DEFAULT_FORMULA_PATH:-Formula/${BINARY_NAME}.rb}}"
          release_url_aarch64="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${ARCHIVE_NAME_AARCH64}"
          release_url_x86_64="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${ARCHIVE_NAME_X86_64}"

          [[ -n "${ARCHIVE_NAME_AARCH64:-}" ]] || { echo "Missing arm64 archive name" >&2; exit 1; }
          [[ -n "${ARCHIVE_NAME_X86_64:-}" ]] || { echo "Missing x86_64 archive name" >&2; exit 1; }
          [[ "${ARCHIVE_SHA256_AARCH64:-}" =~ ^[0-9a-fA-F]{64}$ ]] || { echo "Invalid arm64 SHA256" >&2; exit 1; }
          [[ "${ARCHIVE_SHA256_X86_64:-}" =~ ^[0-9a-fA-F]{64}$ ]] || { echo "Invalid x86_64 SHA256" >&2; exit 1; }

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "tap_repo=${tap_repo}" >> "$GITHUB_OUTPUT"
          echo "formula_path=${formula_path}" >> "$GITHUB_OUTPUT"
          echo "release_url_aarch64=${release_url_aarch64}" >> "$GITHUB_OUTPUT"
          echo "release_url_x86_64=${release_url_x86_64}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha256_aarch64=${ARCHIVE_SHA256_AARCH64}" >> "$GITHUB_OUTPUT"
          echo "sha256_x86_64=${ARCHIVE_SHA256_X86_64}" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repository
        if: steps.tapmeta.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.tapmeta.outputs.tap_repo }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Create or update formula (arm64 + x86_64)
        if: steps.tapmeta.outputs.skip == 'false'
        env:
          FORMULA_PATH: ${{ steps.tapmeta.outputs.formula_path }}
          RELEASE_URL_AARCH64: ${{ steps.tapmeta.outputs.release_url_aarch64 }}
          RELEASE_URL_X86_64: ${{ steps.tapmeta.outputs.release_url_x86_64 }}
          VERSION: ${{ steps.tapmeta.outputs.version }}
          SHA256_AARCH64: ${{ steps.tapmeta.outputs.sha256_aarch64 }}
          SHA256_X86_64: ${{ steps.tapmeta.outputs.sha256_x86_64 }}
          BINARY_NAME: ${{ needs.build-sign-notarize.outputs.binary_name }}
        run: |
          set -euo pipefail
          file="tap/${FORMULA_PATH}"
          mkdir -p "$(dirname "$file")"
          if [[ -f "$file" ]]; then
            echo "Updating existing formula: ${FORMULA_PATH}"
          else
            echo "Creating new formula: ${FORMULA_PATH}"
          fi
          class_name="$(echo "${BINARY_NAME}" | sed 's/[-_]/ /g' | awk '{for(i=1;i<=NF;i++){$i=toupper(substr($i,1,1)) substr($i,2)}}1' | tr -d ' ')"
          {
            printf 'class %s < Formula\n' "$class_name"
            printf '  desc "%s CLI"\n' "$BINARY_NAME"
            printf '  homepage "https://github.com/%s"\n' "$GITHUB_REPOSITORY"
            printf '  version "%s"\n' "$VERSION"
            printf '\n'
            printf '  on_macos do\n'
            printf '    on_arm do\n'
            printf '      url "%s"\n' "$RELEASE_URL_AARCH64"
            printf '      sha256 "%s"\n' "$SHA256_AARCH64"
            printf '    end\n'
            printf '\n'
            printf '    on_intel do\n'
            printf '      url "%s"\n' "$RELEASE_URL_X86_64"
            printf '      sha256 "%s"\n' "$SHA256_X86_64"
            printf '    end\n'
            printf '  end\n'
            printf '\n'
            printf '  def install\n'
            printf '    bin.install "%s"\n' "$BINARY_NAME"
            printf '  end\n'
            printf '\n'
            printf '  test do\n'
            printf '    system "#{bin}/%s", "--help"\n' "$BINARY_NAME"
            printf '  end\n'
            printf 'end\n'
          } > "$file"

      - name: Create pull request in tap repo
        if: steps.tapmeta.outputs.skip == 'false'
        continue-on-error: true
        id: tap_pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
          commit-message: "chore: update formula for ${{ needs.build-sign-notarize.outputs.version }}"
          branch: "ci/update-${{ needs.build-sign-notarize.outputs.binary_name }}-${{ needs.build-sign-notarize.outputs.version }}"
          title: "chore: update ${{ needs.build-sign-notarize.outputs.binary_name }} to ${{ needs.build-sign-notarize.outputs.version }}"
          body: |
            Automated update from ${{ github.repository }} release.
            - Version: ${{ needs.build-sign-notarize.outputs.version }}
            - macOS arm64 SHA256: ${{ needs.build-sign-notarize.outputs.archive_sha256_aarch64 }}
            - macOS x86_64 SHA256: ${{ needs.build-sign-notarize.outputs.archive_sha256_x86_64 }}

      - name: Warn if tap PR failed
        if: steps.tapmeta.outputs.skip == 'false' && steps.tap_pr.outcome == 'failure'
        run: |
          echo "Homebrew tap PR creation failed (likely token/repo permissions)."
          echo "Release artifacts were still published successfully."