name: release-macos-sign-notarize

on:
  workflow_dispatch:
    inputs:
      binary_name:
        description: "CLI binary name (cargo package executable)"
        required: false
      version:
        description: "Version without v prefix (optional; defaults to tag name)"
        required: false
      tap_repo:
        description: "owner/repo of Homebrew tap (optional)"
        required: false
      tap_formula_path:
        description: "Path to formula in tap repo (e.g. Formula/mycli.rb)"
        required: false
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  build-sign-notarize:
    runs-on: macos-14
    outputs:
      binary_name: ${{ steps.meta.outputs.binary_name }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}
      archive_name: ${{ steps.package.outputs.archive_name }}
      archive_sha256: ${{ steps.package.outputs.archive_sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Cargo project
        run: |
          [[ -f Cargo.toml ]] || { echo "Cargo.toml not found" >&2; exit 1; }

      - name: Setup Rust 1.93.1
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify specs
        run: cargo spec-verify

      - name: Resolve metadata
        id: meta
        env:
          INPUT_BINARY_NAME: ${{ github.event.inputs.binary_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          if [[ -n "${INPUT_BINARY_NAME:-}" ]]; then
            binary_name="${INPUT_BINARY_NAME}"
          else
            binary_name="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].targets[] | select(.kind[] == "bin") | .name' | head -n1)"
            if [[ -z "${binary_name}" || "${binary_name}" == "null" ]]; then
              binary_name="$(basename "${GITHUB_REPOSITORY}")"
            fi
          fi

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            release_tag="${GITHUB_REF_NAME}"
            version="${release_tag#v}"
          elif [[ -n "${INPUT_VERSION:-}" ]]; then
            version="${INPUT_VERSION}"
            release_tag="v${version}"
          else
            version="0.0.0-dev"
            release_tag="v${version}"
          fi

          echo "binary_name=${binary_name}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"

      - name: Build both macOS targets
        env:
          BINARY_NAME: ${{ steps.meta.outputs.binary_name }}
        run: |
          set -euo pipefail
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          [[ -f "target/aarch64-apple-darwin/release/${BINARY_NAME}" ]] || { echo "Missing ARM binary" >&2; exit 1; }
          [[ -f "target/x86_64-apple-darwin/release/${BINARY_NAME}" ]] || { echo "Missing x86_64 binary" >&2; exit 1; }

      - name: Create universal binary
        env:
          BINARY_NAME: ${{ steps.meta.outputs.binary_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          lipo -create \
            "target/aarch64-apple-darwin/release/${BINARY_NAME}" \
            "target/x86_64-apple-darwin/release/${BINARY_NAME}" \
            -output "dist/${BINARY_NAME}"
          chmod +x "dist/${BINARY_NAME}"

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          [[ -n "${MACOS_CERTIFICATE_P12_BASE64}" ]] || { echo "Missing MACOS_CERTIFICATE_P12_BASE64" >&2; exit 1; }
          [[ -n "${MACOS_CERTIFICATE_PASSWORD}" ]] || { echo "Missing MACOS_CERTIFICATE_PASSWORD" >&2; exit 1; }
          [[ -n "${MACOS_KEYCHAIN_PASSWORD}" ]] || { echo "Missing MACOS_KEYCHAIN_PASSWORD" >&2; exit 1; }

          echo "${MACOS_CERTIFICATE_P12_BASE64}" | base64 --decode > cert.p12
          security create-keychain -p "${MACOS_KEYCHAIN_PASSWORD}" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "${MACOS_KEYCHAIN_PASSWORD}" build.keychain
          security import cert.p12 -k build.keychain -P "${MACOS_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security list-keychain -d user -s build.keychain login.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "${MACOS_KEYCHAIN_PASSWORD}" build.keychain

      - name: Code sign binary
        env:
          BINARY_NAME: ${{ steps.meta.outputs.binary_name }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          [[ -n "${MACOS_SIGNING_IDENTITY}" ]] || { echo "Missing MACOS_SIGNING_IDENTITY" >&2; exit 1; }
          codesign --force --options runtime --timestamp --sign "${MACOS_SIGNING_IDENTITY}" "dist/${BINARY_NAME}"
          codesign --verify --verbose=2 "dist/${BINARY_NAME}"

      - name: Package and checksum
        id: package
        env:
          BINARY_NAME: ${{ steps.meta.outputs.binary_name }}
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
        run: |
          set -euo pipefail
          archive_name="${BINARY_NAME}-${RELEASE_TAG}-universal-apple-darwin.tar.gz"
          tar -C dist -czf "dist/${archive_name}" "${BINARY_NAME}"
          archive_sha256="$(shasum -a 256 "dist/${archive_name}" | awk '{print $1}')"
          echo "archive_name=${archive_name}" >> "$GITHUB_OUTPUT"
          echo "archive_sha256=${archive_sha256}" >> "$GITHUB_OUTPUT"

      - name: Notarize packaged binary
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_P8_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_P8_BASE64 }}
          ARCHIVE_NAME: ${{ steps.package.outputs.archive_name }}
        run: |
          set -euo pipefail
          [[ -n "${APPLE_API_KEY_ID}" ]] || { echo "Missing APPLE_API_KEY_ID" >&2; exit 1; }
          [[ -n "${APPLE_API_ISSUER_ID}" ]] || { echo "Missing APPLE_API_ISSUER_ID" >&2; exit 1; }
          [[ -n "${APPLE_API_PRIVATE_KEY_P8_BASE64}" ]] || { echo "Missing APPLE_API_PRIVATE_KEY_P8_BASE64" >&2; exit 1; }
          api_key_file="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "${APPLE_API_PRIVATE_KEY_P8_BASE64}" | base64 --decode > "${api_key_file}"
          xcrun notarytool submit "dist/${ARCHIVE_NAME}" \
            --key "${api_key_file}" \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER_ID}" \
            --wait
          rm -f "${api_key_file}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.archive_name }}
          path: dist/${{ steps.package.outputs.archive_name }}

      - name: Publish GitHub release asset
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ steps.package.outputs.archive_name }}

  update-homebrew-tap:
    if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    needs: build-sign-notarize
    env:
      GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Resolve tap metadata
        id: tapmeta
        env:
          INPUT_TAP_REPO: ${{ github.event.inputs.tap_repo }}
          INPUT_FORMULA_PATH: ${{ github.event.inputs.tap_formula_path }}
          DEFAULT_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          DEFAULT_FORMULA_PATH: ${{ vars.HOMEBREW_TAP_FORMULA_PATH }}
          BINARY_NAME: ${{ needs.build-sign-notarize.outputs.binary_name }}
          RELEASE_TAG: ${{ needs.build-sign-notarize.outputs.release_tag }}
          VERSION: ${{ needs.build-sign-notarize.outputs.version }}
          ARCHIVE_NAME: ${{ needs.build-sign-notarize.outputs.archive_name }}
          ARCHIVE_SHA256: ${{ needs.build-sign-notarize.outputs.archive_sha256 }}
        run: |
          set -euo pipefail
          tap_repo="${INPUT_TAP_REPO:-${DEFAULT_TAP_REPO:-}}"
          if [[ -z "${tap_repo}" ]]; then
            echo "No tap repo provided; skipping tap update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          formula_path="${INPUT_FORMULA_PATH:-${DEFAULT_FORMULA_PATH:-Formula/${BINARY_NAME}.rb}}"
          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${ARCHIVE_NAME}"

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "tap_repo=${tap_repo}" >> "$GITHUB_OUTPUT"
          echo "formula_path=${formula_path}" >> "$GITHUB_OUTPUT"
          echo "release_url=${release_url}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha256=${ARCHIVE_SHA256}" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repository
        if: steps.tapmeta.outputs.skip == 'false'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.tapmeta.outputs.tap_repo }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula url/version/sha256
        if: steps.tapmeta.outputs.skip == 'false'
        env:
          FORMULA_PATH: ${{ steps.tapmeta.outputs.formula_path }}
          RELEASE_URL: ${{ steps.tapmeta.outputs.release_url }}
          VERSION: ${{ steps.tapmeta.outputs.version }}
          SHA256: ${{ steps.tapmeta.outputs.sha256 }}
        run: |
          set -euo pipefail
          file="tap/${FORMULA_PATH}"
          [[ -f "$file" ]] || { echo "Formula file not found: $file" >&2; exit 1; }

          perl -0777 -i -pe "s|url \\\"[^\\\"]+\\\"|url \\\"${RELEASE_URL}\\\"|g" "$file"
          perl -0777 -i -pe "s|sha256 \\\"[a-f0-9]+\\\"|sha256 \\\"${SHA256}\\\"|g" "$file"
          perl -0777 -i -pe "s|version \\\"[^\\\"]+\\\"|version \\\"${VERSION}\\\"|g" "$file"

      - name: Create pull request in tap repo
        if: steps.tapmeta.outputs.skip == 'false'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap
          commit-message: "chore: update formula for ${{ needs.build-sign-notarize.outputs.version }}"
          branch: "ci/update-${{ needs.build-sign-notarize.outputs.binary_name }}-${{ needs.build-sign-notarize.outputs.version }}"
          title: "chore: update ${{ needs.build-sign-notarize.outputs.binary_name }} to ${{ needs.build-sign-notarize.outputs.version }}"
          body: |
            Automated update from ${{ github.repository }} release.
            - Version: ${{ needs.build-sign-notarize.outputs.version }}
            - SHA256: ${{ needs.build-sign-notarize.outputs.archive_sha256 }}