name: ci-verify

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: CI: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      CARGO_HOME: ${{ github.workspace }}/.cargo
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    steps:
      - name: CI: Checkout
        uses: actions/checkout@v4

      - name: CI: Detect cargo workspace
        id: cargo
        run: |
          if [[ -f Cargo.toml ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: CI: Setup Rust stable
        if: steps.cargo.outputs.present == 'true'
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy,rustfmt

      - name: CI: Cache cargo artifacts
        if: steps.cargo.outputs.present == 'true'
        uses: Swatinem/rust-cache@v2

      - name: CI: Check formatting
        if: steps.cargo.outputs.present == 'true'
        run: cargo fmt --all -- --check

      - name: CI: Run clippy
        if: steps.cargo.outputs.present == 'true'
        run: cargo clippy --all-targets -- -D warnings

      - name: CI: Run tests
        if: steps.cargo.outputs.present == 'true'
        run: cargo test --all-targets

      - name: CI: Skip message
        if: steps.cargo.outputs.present != 'true'
        run: echo "No Cargo.toml found; skipping Rust CI checks."