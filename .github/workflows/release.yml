name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write  # required for sigstore/cosign keyless signing

jobs:
  build-and-sign:
    name: Build and sign (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    env:
      CARGO_HOME: ${{ github.workspace }}/.cargo
      CARGO_TARGET_DIR: ${{ github.workspace }}/target
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: gitvault-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gitvault-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: gitvault-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.os == 'ubuntu-latest' && contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Build release binary (stripped via Cargo profile)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/gitvault ${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/gitvault.exe ${{ matrix.artifact }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign artifact with cosign (keyless)
        run: cosign sign-blob --yes --bundle ${{ matrix.artifact }}.bundle ${{ matrix.artifact }}

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.bundle
