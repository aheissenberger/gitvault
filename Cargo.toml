[package]
name = "gitvault"
version = "0.2.0"
edition = "2024"
description = "gitvault CLI"
license = "MIT"

[[bin]]
name = "gitvault"
path = "src/main.rs"

[dependencies]
age = { version = "0.10", features = ["armor"] }
clap = { version = "4", features = ["derive", "env"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = { version = "0.8", features = ["preserve_order"] }
anyhow = "1"
thiserror = "1"
tempfile = "3"
keyring = "3"

[dev-dependencies]
tempfile = "3"

[profile.release]
strip = "symbols"