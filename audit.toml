# This file documents the security advisory exceptions for gitvault.
# cargo-audit reads config from $CARGO_HOME/audit.toml, not the workspace root,
# so this file serves as documentation only. CI passes --ignore explicitly.
# See .github/workflows/build.yml "Security audit" step.

[advisories]
# RUSTSEC-2023-0071: Marvin Attack — timing side-channel in rsa 0.9.x
#
# Transitive dependency chain: age 0.10.1 → rsa 0.9.10
# No fixed version of `rsa` is available upstream as of 2026-03.
#
# Risk for gitvault: LOW.
# The Marvin Attack requires a network-accessible RSA decryption oracle with
# measurable response-time differences.  gitvault is a local CLI tool; the RSA
# operations exposed via `age` are used only for SSH RSA key *format* decoding
# (parsing an SSH key file), not for any network-facing decryption service.
# Revisit once age 0.11+ ships with an updated rsa dependency.
#
# RUSTSEC-2024-0370: proc-macro-error is unmaintained
#
# Transitive dependency chain: age 0.10.1 → i18n-embed-fl 0.7.0 → proc-macro-error 1.0.4
# This is a build-time proc-macro crate; it has no runtime exposure.
# No upgrade path available until age updates i18n-embed-fl.
ignore = ["RUSTSEC-2023-0071", "RUSTSEC-2024-0370"]
